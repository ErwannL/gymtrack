name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install
        working-directory: ./gymtrack


      - name: Set appVersion in App.js to tag
        run: |
          sed -i "s/appVersion: *['\"][^'\"]*['\"]/appVersion: '${GITHUB_REF_NAME}'/g" src/App.js
        working-directory: ./gymtrack

      - name: Build React app
        run: npm run build
        working-directory: ./gymtrack

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Capacitor sync
        run: npx cap sync android
        working-directory: ./gymtrack

      - name: Decrypt keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > gymtrack/android/my-release-key.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=../my-release-key.jks" > gymtrack/android/keystore.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> gymtrack/android/keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> gymtrack/android/keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> gymtrack/android/keystore.properties



      - name: Set up git user from pusher
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
        working-directory: ./gymtrack

      - name: Make build script executable
        run: chmod +x ./build-gymtrack.sh
        working-directory: ./gymtrack

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew
        working-directory: ./gymtrack

      - name: Build APK
        run: ./build-gymtrack.sh --release ${{ github.ref_name }}
        working-directory: ./gymtrack

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: gymtrack-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
